services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: local_qdrant
    ports:
      - "6333:6333" 
    volumes:
      - ./qdrant_storage:/qdrant/storage:z 
    restart: unless-stopped
    
  backend:
    build: .
    container_name: local_backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:               
      - ./uploads:/app/uploads
    depends_on:
      - qdrant

  frontend:
      build: .
      container_name: local_frontend
      command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
      ports:
        - "8501:8501"
      depends_on:
        - backend